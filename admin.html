<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Адмінка — Mereely Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Forum&family=Inter:wght@400;500;600&display=swap"/>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4eee5;color:#1e231f;min-height:100vh}
input,textarea,select{font-family:inherit;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.hidden{display:none!important}

/* LOGIN */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#f1ebe1;border:1px solid rgba(30,35,31,.16);padding:40px;width:360px;text-align:center}
.login-box h1{font-family:'Forum',serif;font-size:28px;margin-bottom:8px}
.login-box p{font-size:13px;color:#6c7166;margin-bottom:28px}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6c7166;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:#fff;border:1px solid rgba(30,35,31,.2);padding:12px 14px;font-size:14px;color:#1e231f;outline:none}
.btn{display:inline-block;padding:13px 24px;background:#28332c;color:#f1ebe1;font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;transition:background .25s;border:none;cursor:pointer}
.btn:hover{background:#a7613f}
.btn-sm{padding:9px 16px;font-size:11px}
.btn-outline{background:transparent;color:#28332c;border:1px solid rgba(30,35,31,.3)}
.btn-outline:hover{background:#28332c;color:#f1ebe1}
.btn-danger{background:#c0392b}
.btn-danger:hover{background:#962d22}
.btn-full{width:100%}
.err{color:#a7613f;font-size:12px;margin-top:6px}

/* LAYOUT */
#app{display:flex;min-height:100vh}
.sidebar{width:230px;background:#28332c;color:#f1ebe1;padding:24px 0;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{font-family:'Forum',serif;font-size:22px;padding:0 22px 22px;border-bottom:1px solid rgba(241,235,225,.1);margin-bottom:14px}
.sidebar-logo span{display:block;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;opacity:.5;margin-top:4px}
.nav-item{display:block;padding:11px 22px;font-size:13px;color:rgba(241,235,225,.7);cursor:pointer;transition:all .2s}
.nav-item:hover,.nav-item.active{background:rgba(241,235,225,.08);color:#f1ebe1}
.sidebar-footer{margin-top:auto;padding:14px 22px;border-top:1px solid rgba(241,235,225,.1)}
.sidebar-footer button{font-size:12px;color:rgba(241,235,225,.5);transition:color .2s}
.sidebar-footer button:hover{color:#f1ebe1}
.main{flex:1;padding:28px 32px;overflow-y:auto;min-width:0}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.page-header h2{font-family:'Forum',serif;font-size:28px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:#f1ebe1;border:1px solid rgba(30,35,31,.12);padding:18px}
.stat-card .num{font-family:'Forum',serif;font-size:30px;color:#28332c}
.stat-card .lbl{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#6c7166;margin-top:4px}

/* TABLE */
.card{background:#f1ebe1;border:1px solid rgba(30,35,31,.12);padding:22px;margin-bottom:18px}
.card h3{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#6c7166;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6c7166;padding:0 10px 10px;font-weight:500}
td{padding:10px;border-top:1px solid rgba(30,35,31,.08);vertical-align:middle}
tr:hover td{background:rgba(30,35,31,.025)}
.badge{display:inline-block;padding:2px 8px;font-size:11px;font-weight:600;letter-spacing:.06em}
.badge-sale{background:#a7613f22;color:#a7613f}
.badge-new{background:#28332c22;color:#28332c}
.badge-best{background:#6f7a5e22;color:#6f7a5e}
.actions{display:flex;gap:6px}

/* PRODUCT THUMB in table */
.prod-thumb{width:44px;height:44px;object-fit:cover;border:1px solid rgba(30,35,31,.1)}
.prod-thumb-placeholder{width:44px;height:44px;background:#e8e2d8;display:flex;align-items:center;justify-content:center;font-size:18px}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(20,26,21,.65);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto}
.modal{background:#f1ebe1;width:min(700px,100%);padding:32px;margin:auto}
.modal h3{font-family:'Forum',serif;font-size:24px;margin-bottom:22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.modal-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(30,35,31,.12)}
.section-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6c7166;margin-bottom:10px;display:block}

/* COLOR PALETTE */
.color-palette{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.color-swatch{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;transition:transform .15s}
.color-swatch:hover{transform:scale(1.12)}
.color-swatch.selected{border-color:#28332c;box-shadow:0 0 0 2px #fff,0 0 0 4px #28332c}
.color-custom-row{display:flex;gap:8px;align-items:center;margin-top:4px}
.color-custom-row input[type=text]{flex:1;background:#fff;border:1px solid rgba(30,35,31,.2);padding:8px 10px;font-size:13px;color:#1e231f;outline:none}
.color-custom-row input[type=color]{width:36px;height:36px;border:1px solid rgba(30,35,31,.2);cursor:pointer;padding:2px;background:#fff}
.selected-colors{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.selected-color-chip{display:flex;align-items:center;gap:5px;background:#fff;border:1px solid rgba(30,35,31,.15);padding:4px 8px;font-size:12px}
.selected-color-chip .swatch{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.selected-color-chip .rm{color:#8a8f84;font-size:14px;line-height:1;cursor:pointer;margin-left:2px}
.selected-color-chip .rm:hover{color:#a7613f}

/* SIZE CHIPS */
.size-chips{display:flex;flex-wrap:wrap;gap:6px}
.size-chip{padding:8px 14px;font-size:12.5px;font-weight:600;border:1px solid rgba(30,35,31,.25);background:transparent;color:#1e231f;cursor:pointer;transition:all .18s;letter-spacing:.04em}
.size-chip:hover{border-color:#28332c}
.size-chip.selected{background:#28332c;color:#f1ebe1;border-color:#28332c}

/* IMAGE UPLOAD */
.img-upload-area{border:2px dashed rgba(30,35,31,.2);background:#fff;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative}
.img-upload-area:hover,.img-upload-area.drag-over{border-color:#28332c}
.img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-upload-area p{font-size:13px;color:#6c7166;pointer-events:none}
.img-upload-area p strong{color:#28332c}
.img-previews{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.img-preview-item{position:relative;width:90px;height:90px}
.img-preview-item img{width:100%;height:100%;object-fit:cover;border:1px solid rgba(30,35,31,.12)}
.img-preview-item .rm-img{position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:#c0392b;color:#fff;border-radius:50%;font-size:13px;line-height:20px;text-align:center;cursor:pointer;font-weight:700}
.img-preview-item .drag-handle{position:absolute;bottom:0;left:0;right:0;background:rgba(30,35,31,.5);color:#fff;font-size:10px;text-align:center;padding:2px;cursor:grab}

/* ORDERS */
.order-status{display:inline-block;padding:3px 8px;font-size:11px;font-weight:600}
.status-new{background:#eef0e6;color:#28332c}
.status-sent{background:#fef3e2;color:#a7613f}
.status-done{background:#e6f0ee;color:#2c5248}

@media(max-width:900px){
  #app{flex-direction:column}
  .sidebar{width:100%;padding:12px 0}
  .stats-row{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .form-grid .full{grid-column:1}
  .main{padding:16px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h1>Mereely Admin</h1>
    <p>Введіть пароль для доступу</p>
    <div class="field"><label>Пароль</label><input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn btn-full" onclick="doLogin()">Увійти</button>
    <div class="err hidden" id="login-err">Невірний пароль</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <nav class="sidebar">
    <div class="sidebar-logo">Mereely<span>Admin Panel</span></div>
    <span class="nav-item active" onclick="showPage('dashboard',this)">📊 Дашборд</span>
    <span class="nav-item" onclick="showPage('products',this)">👗 Товари</span>
    <span class="nav-item" onclick="showPage('orders',this)">📦 Замовлення</span>
    <span class="nav-item" onclick="showPage('subscribers',this)">📧 Підписники</span>
    <span class="nav-item" onclick="showPage('settings',this)">⚙️ Налаштування</span>
    <div class="sidebar-footer">
      <a href="index.html" style="display:block;font-size:12px;color:rgba(241,235,225,.5);text-decoration:none;margin-bottom:8px;transition:color .2s" onmouseover="this.style.color='#f1ebe1'" onmouseout="this.style.color='rgba(241,235,225,.5)'">← На сайт</a>
      <button onclick="logout()">Вийти</button>
    </div>
  </nav>
  <main class="main" id="main-content"></main>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-bg hidden" id="prod-modal" onclick="handleModalBgClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">Новий товар</h3>
    <div class="form-grid">

      <!-- Basic info -->
      <div class="field"><label>Назва *</label><input id="f-name" placeholder="Сукня «Сієна»"/></div>
      <div class="field"><label>Ціна (грн) *</label><input id="f-price" type="number" placeholder="3490" min="0"/></div>
      <div class="field"><label>Стара ціна (грн)</label><input id="f-old" type="number" placeholder=""/></div>
      <div class="field"><label>Категорія *</label>
        <select id="f-cat">
          <option value="Сукні">Сукні</option>
          <option value="Верх">Верх</option>
          <option value="Низ">Низ</option>
          <option value="Верхній одяг">Верхній одяг</option>
          <option value="Трикотаж">Трикотаж</option>
          <option value="Аксесуари">Аксесуари</option>
        </select>
      </div>
      <div class="field"><label>Значок</label>
        <select id="f-badge">
          <option value="">— Немає —</option>
          <option value="Новинка">Новинка</option>
          <option value="Бестселер">Бестселер</option>
          <option value="Sale">Sale</option>
        </select>
      </div>
      <div class="field"><label>Акцентний колір (hex)</label><input id="f-tone" placeholder="#7c8568"/></div>
      <div class="field" style="display:flex;align-items:center;gap:10px;padding-top:20px">
        <input type="checkbox" id="f-active" checked style="width:18px;height:18px;cursor:pointer"/>
        <label for="f-active" style="font-size:14px;cursor:pointer;letter-spacing:normal;text-transform:none;color:#1e231f">Показувати на сайті</label>
      </div>
      <div class="field full"><label>Опис</label><textarea id="f-desc" rows="3" style="resize:vertical"></textarea></div>

      <!-- Sizes -->
      <div class="field full">
        <span class="section-label">Доступні розміри</span>
        <div class="size-chips" id="size-chips">
          <!-- rendered by JS -->
        </div>
      </div>

      <!-- Colors -->
      <div class="field full">
        <span class="section-label">Кольори товару</span>
        <div class="color-palette" id="color-palette">
          <!-- rendered by JS -->
        </div>
        <div class="color-custom-row">
          <input type="color" id="custom-color-picker" value="#7c8568" title="Оберіть колір"/>
          <input type="text" id="custom-color-name" placeholder="Назва кольору (напр. Олива)" style="flex:1"/>
          <button class="btn btn-outline btn-sm" type="button" onclick="addCustomColor()">+ Додати</button>
        </div>
        <div class="selected-colors" id="selected-colors">
          <!-- chips rendered by JS -->
        </div>
      </div>

      <!-- Images -->
      <div class="field full">
        <span class="section-label">Фото товару (до 10 зображень)</span>
        <div class="img-upload-area" id="drop-zone">
          <input type="file" id="f-images" accept="image/*" multiple onchange="handleImageFiles(this.files)"/>
          <p>📷 <strong>Клікніть або перетягніть</strong> фото сюди<br/><span style="font-size:12px">JPG, PNG, WebP — до 5 МБ кожне</span></p>
        </div>
        <div class="img-previews" id="img-previews"></div>
      </div>

    </div><!-- /form-grid -->
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" type="button" onclick="closeProdModal()">Скасувати</button>
      <button class="btn btn-sm" type="button" onclick="saveProd()">Зберегти товар</button>
    </div>
  </div>
</div>

<script>
/* ===================== CONSTANTS ===================== */
const ADMIN_PW = 'mereely2024';

const ALL_SIZES = ['XS','S','M','L','XL','XXL','One size'];

const PALETTE_COLORS = [
  {name:'Олива',     hex:'#7c8568'},
  {name:'Шавлія',    hex:'#b8bca8'},
  {name:'Пісок',     hex:'#d4c8a8'},
  {name:'Графіт',    hex:'#54584f'},
  {name:'Чорнило',   hex:'#3d4047'},
  {name:'Теракота',  hex:'#a97860'},
  {name:'Молоко',    hex:'#f0ebe0'},
  {name:'Камел',     hex:'#c4a070'},
  {name:'Чорний',    hex:'#1a1a1a'},
  {name:'Білий',     hex:'#f8f5ef'},
  {name:'Бордо',     hex:'#7a2535'},
  {name:'Морська хвиля', hex:'#4a7c8c'},
];

/* ===================== STATE ===================== */
let editingId = null;
let selectedSizes = [];
let selectedColors = [];
let uploadedImages = [];   // [{url:'...', file:File|null}]

/* ===================== AUTH ===================== */
function doLogin(){
  const pw = document.getElementById('pw-input').value;
  if(pw === ADMIN_PW){
    localStorage.setItem('mrl_admin','1');
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    showPage('dashboard', document.querySelector('.nav-item'));
  } else {
    document.getElementById('login-err').classList.remove('hidden');
  }
}
function logout(){ localStorage.removeItem('mrl_admin'); location.reload(); }

if(localStorage.getItem('mrl_admin')==='1'){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  showPage('dashboard', document.querySelector('.nav-item'));
}

/* ===================== ROUTING ===================== */
function showPage(name, el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  const mc = document.getElementById('main-content');
  if(name==='dashboard')   { mc.innerHTML = '<div class="page-header"><h2>Дашборд</h2></div><div style="color:#6c7166;padding:20px">Завантаження…</div>'; loadDashboard(); }
  else if(name==='products')    { mc.innerHTML = '<div class="page-header"><h2>Товари</h2></div><div style="color:#6c7166;padding:20px">Завантаження…</div>'; loadProducts(); }
  else if(name==='orders')      { mc.innerHTML = '<div class="page-header"><h2>Замовлення</h2></div><div style="color:#6c7166;padding:20px">Завантаження…</div>'; loadOrders(); }
  else if(name==='subscribers') { mc.innerHTML = '<div class="page-header"><h2>Підписники</h2></div><div style="color:#6c7166;padding:20px">Завантаження…</div>'; loadSubscribers(); }
  else if(name==='settings')    { mc.innerHTML = renderSettings(); }
}

/* ===================== API HELPERS ===================== */
async function api(action, params){
  const url = '/api/?action='+action+(params?'&'+new URLSearchParams(params):'');
  const r = await fetch(url);
  return r.json();
}
async function apiPost(action, body){
  const r = await fetch('/api/?action='+action, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  return r.json();
}

/* ===================== DASHBOARD ===================== */
async function loadDashboard(){
  const mc = document.getElementById('main-content');
  try {
    const [st, orders] = await Promise.all([api('status'), api('orders_list','limit=5')]);
    const c = st.counts || {};
    const recentRows = (orders.rows||[]).map(o=>{
      const d = new Date(o.created_at).toLocaleDateString('uk-UA');
      const name = esc((o.contact||{}).name||'—');
      return `<tr>
        <td style="font-size:12px;color:#6c7166">#${o.id}<br/>${d}</td>
        <td>${name}</td>
        <td><strong>${(o.total||0).toLocaleString('uk-UA')} ₴</strong></td>
        <td><span class="order-status status-${o.status==='new'?'new':(o.status==='shipped'?'sent':'done')}">${statusLabel(o.status)}</span></td>
      </tr>`;
    }).join('') || '<tr><td colspan="4" style="padding:24px;color:#6c7166;text-align:center">Замовлень ще немає</td></tr>';

    mc.innerHTML = `
      <div class="page-header"><h2>Дашборд</h2></div>
      <div class="stats-row">
        <div class="stat-card"><div class="num">${c.orders||0}</div><div class="lbl">Замовлень</div></div>
        <div class="stat-card"><div class="num">${c.products||0}</div><div class="lbl">Товарів</div></div>
        <div class="stat-card"><div class="num">${c.subscribers||0}</div><div class="lbl">Підписників</div></div>
        <div class="stat-card"><div class="num">${c.cities||0}</div><div class="lbl">Міст у базі</div></div>
      </div>
      <div class="card"><h3>Останні замовлення</h3>
        <table><thead><tr><th>ID / Дата</th><th>Клієнт</th><th>Сума</th><th>Статус</th></tr></thead>
        <tbody>${recentRows}</tbody></table>
      </div>`;
  } catch(e){ mc.innerHTML = '<div style="color:#a7613f;padding:20px">Помилка завантаження: '+esc(e.message)+'</div>'; }
}

function statusLabel(s){ return {new:'Нове',confirmed:'Підтверджено',shipped:'Відправлено',delivered:'Доставлено',cancelled:'Скасовано'}[s]||s; }

/* ===================== PRODUCTS ===================== */
async function loadProducts(){
  const mc = document.getElementById('main-content');
  try {
    const prods = await api('admin_products');
    const rows = Array.isArray(prods) && prods.length ? prods.map(p=>{
      const thumb = p.images&&p.images[0]
        ? `<img src="${esc(p.images[0])}" class="prod-thumb" alt="${esc(p.name)}"/>`
        : `<div class="prod-thumb-placeholder">👗</div>`;
      const colorDots = (p.colors||[]).slice(0,4).map(c=>`<span title="${esc(c.name||c[0]||'')}" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${esc(c.hex||c[1]||'#ccc')};border:1px solid rgba(0,0,0,.15);margin-right:2px"></span>`).join('');
      const active = p.active?'':'<span style="color:#a7613f;font-size:11px"> (прихований)</span>';
      return `<tr>
        <td style="width:54px">${thumb}</td>
        <td><strong>${esc(p.name)}</strong>${active}<br/><span style="font-size:12px;color:#6c7166">${(p.sizes||[]).join(', ')}</span></td>
        <td>${esc(p.category||'')}</td>
        <td><strong>${(p.price||0).toLocaleString('uk-UA')} ₴</strong>${p.old_price?` <s style="color:#8a8f84;font-size:11px">${p.old_price} ₴</s>`:''}</td>
        <td>${colorDots}</td>
        <td><div class="actions">
          <button class="btn btn-outline btn-sm" onclick="editProd(${p.id})">Ред.</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProd(${p.id})">✕</button>
        </div></td>
      </tr>`;
    }).join('') : `<tr><td colspan="6" style="text-align:center;padding:32px;color:#6c7166">Товарів поки немає — додайте перший!</td></tr>`;

    mc.innerHTML = `
      <div class="page-header"><h2>Товари</h2><button class="btn btn-sm" onclick="openNewProd()">+ Додати товар</button></div>
      <div class="card"><table>
        <thead><tr><th></th><th>Назва / Розміри</th><th>Категорія</th><th>Ціна</th><th>Кольори</th><th>Дії</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
    window._adminProds = Array.isArray(prods) ? prods : [];
  } catch(e){ mc.innerHTML = '<div style="color:#a7613f;padding:20px">Помилка: '+esc(e.message)+'</div>'; }
}

/* ---------- MODAL OPEN/CLOSE ---------- */
function handleModalBgClick(e){ if(e.target===e.currentTarget) closeProdModal(); }

function openNewProd(){
  editingId = null;
  selectedSizes = [];
  selectedColors = [];
  uploadedImages = [];
  document.getElementById('modal-title').textContent = 'Новий товар';
  document.getElementById('f-name').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-old').value = '';
  document.getElementById('f-cat').value = 'Сукні';
  document.getElementById('f-badge').value = '';
  document.getElementById('f-tone').value = '#7c8568';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-active').checked = true;
  document.getElementById('f-images').value = '';
  renderSizeChips();
  renderColorPalette();
  renderSelectedColors();
  renderImagePreviews();
  document.getElementById('prod-modal').classList.remove('hidden');
}

function editProd(id){
  const p = (window._adminProds||[]).find(x=>x.id===id);
  if(!p) return;
  editingId = id;
  selectedSizes = [...(p.sizes||[])];
  selectedColors = (p.colors||[]).map(c=>Array.isArray(c)?{name:c[0],hex:c[1]}:c);
  uploadedImages = (p.images||[]).map(url=>({url, file:null}));
  document.getElementById('modal-title').textContent = 'Редагувати товар';
  document.getElementById('f-name').value = p.name||'';
  document.getElementById('f-price').value = p.price||'';
  document.getElementById('f-old').value = p.old_price||'';
  document.getElementById('f-cat').value = p.category||'Сукні';
  document.getElementById('f-badge').value = p.badge||'';
  document.getElementById('f-tone').value = p.tone||'#7c8568';
  document.getElementById('f-desc').value = p.description||'';
  document.getElementById('f-active').checked = !!p.active;
  document.getElementById('f-images').value = '';
  renderSizeChips();
  renderColorPalette();
  renderSelectedColors();
  renderImagePreviews();
  document.getElementById('prod-modal').classList.remove('hidden');
}

function closeProdModal(){
  document.getElementById('prod-modal').classList.add('hidden');
}

/* ---------- SIZES ---------- */
function renderSizeChips(){
  const el = document.getElementById('size-chips');
  if(!el) return;
  el.innerHTML = ALL_SIZES.map(sz=>`
    <button type="button" class="size-chip${selectedSizes.includes(sz)?' selected':''}" onclick="toggleSize('${sz}')">${sz}</button>
  `).join('');
}
function toggleSize(sz){
  if(selectedSizes.includes(sz)) selectedSizes = selectedSizes.filter(s=>s!==sz);
  else selectedSizes.push(sz);
  renderSizeChips();
}

/* ---------- COLORS ---------- */
function renderColorPalette(){
  const el = document.getElementById('color-palette');
  if(!el) return;
  el.innerHTML = PALETTE_COLORS.map(c=>{
    const isSel = selectedColors.some(s=>s.hex===c.hex);
    return `<span class="color-swatch${isSel?' selected':''}" style="background:${c.hex}" title="${esc(c.name)}" onclick="togglePaletteColor('${c.name}','${c.hex}')"></span>`;
  }).join('');
}
function togglePaletteColor(name, hex){
  const idx = selectedColors.findIndex(s=>s.hex===hex);
  if(idx>=0) selectedColors.splice(idx,1);
  else selectedColors.push({name, hex});
  renderColorPalette();
  renderSelectedColors();
}
function addCustomColor(){
  const hex = document.getElementById('custom-color-picker').value;
  const name = document.getElementById('custom-color-name').value.trim() || hex;
  if(selectedColors.some(s=>s.hex===hex)) return;
  selectedColors.push({name, hex});
  document.getElementById('custom-color-name').value = '';
  renderColorPalette();
  renderSelectedColors();
}
function removeColor(hex){
  selectedColors = selectedColors.filter(c=>c.hex!==hex);
  renderColorPalette();
  renderSelectedColors();
}
function renderSelectedColors(){
  const el = document.getElementById('selected-colors');
  if(!el) return;
  if(!selectedColors.length){ el.innerHTML = '<span style="font-size:12px;color:#8a8f84">Жодного кольору не обрано</span>'; return; }
  el.innerHTML = selectedColors.map(c=>`
    <div class="selected-color-chip">
      <span class="swatch" style="background:${esc(c.hex)}"></span>
      <span>${esc(c.name)}</span>
      <span class="rm" onclick="removeColor('${esc(c.hex)}')">×</span>
    </div>`).join('');
}

/* ---------- IMAGES ---------- */
function handleImageFiles(files){
  const MAX = 10;
  Array.from(files).slice(0, MAX - uploadedImages.length).forEach(file=>{
    if(!file.type.startsWith('image/')) return;
    if(file.size > 10*1024*1024){ alert(file.name+' — перевищує 10 МБ'); return; }
    const reader = new FileReader();
    reader.onload = e=>{ uploadedImages.push({url:e.target.result, file}); renderImagePreviews(); };
    reader.readAsDataURL(file);
  });
}
function removeImage(idx){ uploadedImages.splice(idx,1); renderImagePreviews(); }
function renderImagePreviews(){
  const el = document.getElementById('img-previews');
  if(!el) return;
  el.innerHTML = uploadedImages.map((img,i)=>`
    <div class="img-preview-item">
      <img src="${img.url}" alt="фото ${i+1}"/>
      <div class="rm-img" onclick="removeImage(${i})">×</div>
      <div class="drag-handle">︙</div>
    </div>`).join('');
}

/* Drag-and-drop for upload area */
document.addEventListener('DOMContentLoaded', ()=>{
  const dz = document.getElementById('drop-zone');
  if(!dz) return;
  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', ()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('drag-over'); handleImageFiles(e.dataTransfer.files); });
});

/* ---------- SAVE ---------- */
async function saveProd(){
  const name = document.getElementById('f-name').value.trim();
  const price = parseInt(document.getElementById('f-price').value)||0;
  if(!name){ alert('Вкажіть назву товару'); return; }
  if(!price){ alert('Вкажіть ціну товару'); return; }

  const btn = document.querySelector('.modal-footer .btn:last-child');
  btn.textContent = 'Зберігаю…'; btn.disabled = true;

  try {
    // Спочатку завантажуємо нові фото на сервер
    const imageUrls = [];
    for(const img of uploadedImages){
      if(!img.file){
        imageUrls.push(img.url); // вже на сервері
      } else {
        const fd = new FormData();
        fd.append('file', img.file);
        const r = await fetch('/api/?action=upload_image', {method:'POST', body:fd});
        const d = await r.json();
        if(!d.ok) throw new Error(d.error||'Помилка завантаження фото');
        imageUrls.push(d.url);
      }
    }

    const obj = {
      id: editingId||0,
      name, price,
      old_price: parseInt(document.getElementById('f-old').value)||0,
      category: document.getElementById('f-cat').value,
      badge: document.getElementById('f-badge').value||'',
      description: document.getElementById('f-desc').value.trim(),
      sizes: [...selectedSizes],
      colors: selectedColors,
      images: imageUrls,
      active: document.getElementById('f-active').checked ? 1 : 0,
      sort_order: 0,
    };

    const res = await apiPost('product_save', obj);
    if(!res.ok) throw new Error(res.error||'Помилка збереження');
    closeProdModal();
    loadProducts();
  } catch(e){
    alert('Помилка: '+e.message);
  } finally {
    btn.textContent = 'Зберегти товар'; btn.disabled = false;
  }
}

async function deleteProd(id){
  if(!confirm('Видалити товар? Це незворотно.')) return;
  await apiPost('product_delete', {id});
  loadProducts();
}

      const d = new Date(s.created_at).toLocaleDateString('uk-UA');
      return `<tr>

    }).join('') : `<tr><td colspan="5" style="padding:32px;text-align:center;color:#6c7166">Підписників ще немає</td></tr>`;

    const exportBtn = Array.isArray(subs)&&subs.length

async function deleteSubscriber(id){
  if(!confirm('Відписати цей email?')) return;
  await apiPost('subscriber_delete', {id});
  loadSubscribers();
}

function exportSubscribers(){
  const subs = (window._subscribers||[]).filter(s=>s.active);
  const csv = 'Email,Ім\'я,Дата\n' + subs.map(s=>`"${s.email}","${s.name||''}","${s.created_at}"`).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,﻿'+encodeURIComponent(csv);
  a.download = 'subscribers_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

async function uploadMeestData(){
  const input = document.getElementById('meest-file-input');
  const msg = document.getElementById('meest-upload-msg');
  if(!input||!input.files||!input.files[0]){ msg.innerHTML='<span style="color:#a7613f">Оберіть ZIP-файл</span>'; return; }
  msg.innerHTML='<span style="color:#6c7166">Розпаковую архів…</span>';
  try {
    const zip = await JSZip.loadAsync(input.files[0]);

    const readText = async f => {
      const buf = await f.async('arraybuffer');
      try { return new TextDecoder('utf-8',{fatal:true}).decode(buf).replace(/^﻿/,''); }
      catch(e){ return new TextDecoder('windows-1251').decode(buf); }
    };

    const parseLine = line => line.includes('\t') ? line.split('\t') : line.split(';');
    const isUid = s => /^[0-9a-f]{8}-[0-9a-f]{4}-/i.test((s||'').trim());

    msg.innerHTML='<span style="color:#6c7166">Аналізую файли в архіві…</span>';
    const txts = Object.keys(zip.files).filter(k=>!zip.files[k].dir&&k.toLowerCase().endsWith('.txt'));
    if(!txts.length) throw new Error('В архіві не знайдено .txt файлів');

    let cityFile=null, branchFile=null, streetFile=null;
    for(const key of txts){
      const text = await readText(zip.files[key]);
      const lines = text.split(/\r?\n/).filter(l=>l.trim());
      const dataLines = lines.filter(l=>isUid(l.split(';')[0])||isUid(l.split('\t')[0]));
      if(!dataLines.length) continue;
      const p = parseLine(dataLines[0]);
      const cols = p.length;
      const lastIsUid = isUid(p[p.length-1]);
      const hasManyUids = p.filter(x=>isUid(x)).length >= 3;
      if(cols >= 8 && hasManyUids){ cityFile = {key, text}; }
      else if(cols === 4 && lastIsUid){
        const hasAddr = dataLines.slice(0,30).some(l=>{ const pp=parseLine(l); return pp.length>=4&&/\d/.test(pp[2]||''); });
        if(hasAddr) branchFile = {key, text};
      }
      else if(cols >= 10 && !hasManyUids && !streetFile){ streetFile = {key, text}; }
    }

    if(!cityFile) throw new Error('Файл з містами не знайдено');
    if(!branchFile) throw new Error('Файл з відділеннями не знайдено');

    // --- Парсинг міст ---
    msg.innerHTML='<span style="color:#6c7166">Парсую міста…</span>';
    const cities = [];
    for(const line of cityFile.text.split(/\r?\n/)){
      const p = parseLine(line.trim());
      if(!isUid(p[0])) continue;
      cities.push({ uid:p[0].trim(), name:p[1].trim(), type:(p[3]||'').trim() });
    }
    if(!cities.length) throw new Error('Міста не знайдено');

    // --- Парсинг відділень ---
    msg.innerHTML='<span style="color:#6c7166">Парсую відділення…</span>';
    const branches = [];
    for(const line of branchFile.text.split(/\r?\n/)){
      const p = parseLine(line.trim());
      if(p.length < 4 || !isUid(p[0]) || !isUid(p[p.length-1])) continue;
      branches.push({ uid:p[0].trim(), name:p[1].trim(), address:(p[2]||'').trim(), cityUid:p[p.length-1].trim() });
    }
    if(!branches.length) throw new Error('Відділення не знайдено');

    // --- Парсинг вулиць ---
    const streets = {}; // { cityUid: [streetNames] }
    if(streetFile){
      msg.innerHTML='<span style="color:#6c7166">Парсую вулиці (може тривати ~30 сек)…</span>';
      await new Promise(r=>setTimeout(r,10)); // дати UI оновитись
      const branchCityUids = new Set(branches.map(b=>b.cityUid));
      for(const line of streetFile.text.split(/\r?\n/)){
        const p = parseLine(line.trim());
        if(p.length < 6) continue;
        const cityUid = p[5].trim();
        // зберігаємо вулиці для всіх міст (не тільки з відділеннями)
        const stype = p[1].trim(); const sname = p[3].trim();
        if(!sname || sname === '---') continue;
        const street = (stype + ' ' + sname).trim();
        if(!streets[cityUid]) streets[cityUid] = [];
        streets[cityUid].push(street);
      }
    }

    // --- Надсилаємо на сервер ---
    const post = async (type, body) => {
      const r = await fetch('/api/?action=upload', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({type, ...body})
      });
      if(!r.ok){ const d=await r.json(); throw new Error(d.error||'Помилка сервера'); }
      return r.json();
    };

    msg.innerHTML='<span style="color:#6c7166">Завантажую міста на сервер…</span>';
    await post('cities', {cities});

    msg.innerHTML='<span style="color:#6c7166">Завантажую відділення на сервер…</span>';
    await post('branches', {branches});

    if(Object.keys(streets).length){
      msg.innerHTML='<span style="color:#6c7166">Завантажую вулиці на сервер…</span>';
      await post('streets', {streets});
    }

    // Оновлюємо дату
    await fetch('/api/?action=upload', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({type:'updated', date: new Date().toLocaleString('uk-UA')})
    });

    const lockerCount = branches.filter(b=>(b.name||'').toLowerCase().includes('поштомат')).length;
    const streetCount = Object.values(streets).reduce((a,v)=>a+v.length,0);
    msg.innerHTML = `<span style="color:#6f7a5e;font-weight:600">✓ Завантажено: ${branches.length-lockerCount} відділень, ${lockerCount} поштоматів, ${streetCount} вулиць у ${cities.length} містах!</span>`;
    // оновити статус
    setTimeout(()=>showPage('settings',document.querySelector('[data-page="settings"]')),2000);
  } catch(err){
    msg.innerHTML = '<span style="color:#a7613f">Помилка: '+esc(err.message)+'</span>';
  }
}

async function clearMeestData(){
  if(!confirm('Очистити всі дані Meest з бази?')) return;
  try {
    await fetch('/api/?action=upload', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({type:'clear'})
    });
    showPage('settings',document.querySelector('[data-page="settings"]'));
  } catch(e){ alert('Помилка: '+e.message); }
}



async function saveNpKey(){
  const val = document.getElementById('np-key-input').value.trim();
  localStorage.setItem('mrl_np_key', val);
  const msg = document.getElementById('np-key-msg');
  try { await apiPost('settings_set', {np_api_key: val}); } catch(e){}
  if(val){ msg.innerHTML = '<span style="color:#6f7a5e;font-weight:600">✓ Ключ збережено!</span>'; }
  else { msg.innerHTML = '<span style="color:#a7613f">Ключ видалено</span>'; }
  setTimeout(()=>{ msg.innerHTML=''; },4000);
}

function testNpKey(){
  const key = (document.getElementById('np-key-input')||{}).value || localStorage.getItem('mrl_np_key')||'';
  const msg = document.getElementById('np-test-msg');
  if(!key){ msg.innerHTML='<span style="color:#a7613f">Спочатку введіть API-ключ</span>'; return; }
  msg.innerHTML='<span style="color:#8a8f84">Перевірка…</span>';
  fetch('https://api.novaposhta.ua/v2.0/json/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({apiKey:key,modelName:'Address',calledMethod:'searchSettlements',methodProperties:{CityName:'Київ',Limit:1,Page:1}})})
    .then(r=>r.json()).then(d=>{
      if(d.success){ msg.innerHTML='<span style="color:#6f7a5e;font-weight:600">✓ З\'єднання успішне! Ключ працює.</span>'; }
      else { msg.innerHTML='<span style="color:#a7613f">Помилка: '+esc((d.errors||['невірний ключ'])[0])+'</span>'; }
    }).catch(()=>{ msg.innerHTML='<span style="color:#a7613f">Помилка мережі. Перевірте інтернет-з\'єднання.</span>'; });
}

/* ===================== UTILS ===================== */
function esc(s){ return String(s).replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])); }
