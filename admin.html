<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>Адмінка — Mereely Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Forum&family=Inter:wght@400;500;600&display=swap"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4eee5;color:#1e231f;min-height:100vh}
input,textarea,select{font-family:inherit;font-size:14px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.hidden{display:none!important}
#login{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#f1ebe1;border:1px solid rgba(30,35,31,.16);padding:40px;width:360px;text-align:center}
.login-box h1{font-family:'Forum',serif;font-size:28px;margin-bottom:8px}
.login-box p{font-size:13px;color:#6c7166;margin-bottom:28px}
.field{margin-bottom:16px;text-align:left}
.field label{display:block;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6c7166;margin-bottom:6px}
.field input{width:100%;background:#fff;border:1px solid rgba(30,35,31,.2);padding:13px 14px;font-size:14px;color:#1e231f;outline:none}
.btn{display:inline-block;padding:14px 28px;background:#28332c;color:#f1ebe1;font-size:12px;letter-spacing:.2em;text-transform:uppercase;font-weight:600;transition:background .25s;width:100%}
.btn:hover{background:#a7613f}
.btn-sm{padding:9px 18px;font-size:11px}
.btn-outline{background:transparent;color:#28332c;border:1px solid rgba(30,35,31,.3)}
.btn-outline:hover{background:#28332c;color:#f1ebe1}
.btn-danger{background:#a7613f}
.btn-danger:hover{background:#8a4f2e}
.err{color:#a7613f;font-size:12px;margin-top:8px}

#app{display:flex;min-height:100vh}
.sidebar{width:240px;background:#28332c;color:#f1ebe1;padding:24px 0;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{font-family:'Forum',serif;font-size:22px;padding:0 24px 24px;border-bottom:1px solid rgba(241,235,225,.1);margin-bottom:16px}
.sidebar-logo span{display:block;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.2em;text-transform:uppercase;opacity:.5;margin-top:4px}
.nav-item{display:block;padding:11px 24px;font-size:13px;color:rgba(241,235,225,.7);text-decoration:none;transition:all .2s;cursor:pointer}
.nav-item:hover,.nav-item.active{background:rgba(241,235,225,.08);color:#f1ebe1}
.sidebar-footer{margin-top:auto;padding:16px 24px;border-top:1px solid rgba(241,235,225,.1)}
.sidebar-footer button{font-size:12px;color:rgba(241,235,225,.5);transition:color .2s}
.sidebar-footer button:hover{color:#f1ebe1}

.main{flex:1;padding:32px;overflow-y:auto}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}
.page-header h2{font-family:'Forum',serif;font-size:28px}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:#f1ebe1;border:1px solid rgba(30,35,31,.12);padding:20px}
.stat-card .num{font-family:'Forum',serif;font-size:32px;color:#28332c}
.stat-card .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6c7166;margin-top:4px}

.card{background:#f1ebe1;border:1px solid rgba(30,35,31,.12);padding:24px;margin-bottom:20px}
.card h3{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#6c7166;margin-bottom:18px}

table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#6c7166;padding:0 12px 12px;font-weight:500}
td{padding:12px;border-top:1px solid rgba(30,35,31,.08);vertical-align:middle}
tr:hover td{background:rgba(30,35,31,.025)}
.badge{display:inline-block;padding:3px 9px;font-size:11px;font-weight:600;letter-spacing:.06em}
.badge-sale{background:#a7613f22;color:#a7613f}
.badge-new{background:#28332c22;color:#28332c}
.badge-best{background:#6f7a5e22;color:#6f7a5e}
.actions{display:flex;gap:8px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,26,21,.6);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#f1ebe1;width:min(640px,96vw);max-height:90vh;overflow-y:auto;padding:32px}
.modal h3{font-family:'Forum',serif;font-size:24px;margin-bottom:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-grid .full{grid-column:1/-1}
.modal-footer{display:flex;justify-content:flex-end;gap:12px;margin-top:24px;padding-top:20px;border-top:1px solid rgba(30,35,31,.12)}

/* Orders */
.order-status{display:inline-block;padding:3px 9px;font-size:11px;font-weight:600}
.status-new{background:#eef0e6;color:#28332c}
.status-sent{background:#fef3e2;color:#a7613f}
.status-done{background:#e6f0ee;color:#2c5248}

@media(max-width:768px){
  #app{flex-direction:column}
  .sidebar{width:100%;padding:16px 0}
  .stats-row{grid-template-columns:1fr 1fr}
  .form-grid{grid-template-columns:1fr}
  .form-grid .full{grid-column:1}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h1>Mereely Admin</h1>
    <p>Введіть пароль для доступу</p>
    <div class="field"><label>Пароль</label><input type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn" onclick="doLogin()">Увійти</button>
    <div class="err hidden" id="login-err">Невірний пароль</div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <nav class="sidebar">
    <div class="sidebar-logo">Mereely<span>Admin Panel</span></div>
    <span class="nav-item active" onclick="showPage('dashboard',this)">Дашборд</span>
    <span class="nav-item" onclick="showPage('products',this)">Товари</span>
    <span class="nav-item" onclick="showPage('orders',this)">Замовлення</span>
    <div class="sidebar-footer"><button onclick="logout()">Вийти</button></div>
  </nav>
  <main class="main" id="main-content"></main>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-bg hidden" id="prod-modal">
  <div class="modal">
    <h3 id="modal-title">Новий товар</h3>
    <div class="form-grid">
      <div class="field"><label>Назва *</label><input id="f-name" placeholder="Сукня «Сієна»"/></div>
      <div class="field"><label>Ціна (грн) *</label><input id="f-price" type="number" placeholder="3490"/></div>
      <div class="field"><label>Стара ціна (грн)</label><input id="f-old" type="number" placeholder=""/></div>
      <div class="field"><label>Категорія *</label>
        <select id="f-cat" style="width:100%;background:#fff;border:1px solid rgba(30,35,31,.2);padding:13px 14px;color:#1e231f;outline:none">
          <option value="Сукні">Сукні</option><option value="Верх">Верх</option><option value="Низ">Низ</option>
          <option value="Верхній одяг">Верхній одяг</option><option value="Трикотаж">Трикотаж</option><option value="Аксесуари">Аксесуари</option>
        </select>
      </div>
      <div class="field"><label>Значок</label>
        <select id="f-badge" style="width:100%;background:#fff;border:1px solid rgba(30,35,31,.2);padding:13px 14px;color:#1e231f;outline:none">
          <option value="">— Немає —</option><option value="Новинка">Новинка</option><option value="Бестселер">Бестселер</option><option value="Sale">Sale</option>
        </select>
      </div>
      <div class="field"><label>Залишок (шт)</label><input id="f-stock" type="number" placeholder="10"/></div>
      <div class="field"><label>Розміри (через кому)</label><input id="f-sizes" placeholder="XS,S,M,L"/></div>
      <div class="field"><label>Акцентний колір (hex)</label><input id="f-tone" placeholder="#7c8568"/></div>
      <div class="field full"><label>Опис</label><textarea id="f-desc" rows="3" style="width:100%;background:#fff;border:1px solid rgba(30,35,31,.2);padding:13px 14px;outline:none;resize:vertical"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeProdModal()">Скасувати</button>
      <button class="btn btn-sm" onclick="saveProd()">Зберегти</button>
    </div>
  </div>
</div>

<script>
const ADMIN_PW = 'mereely2024';

function doLogin(){
  const pw = document.getElementById('pw-input').value;
  if(pw === ADMIN_PW){
    localStorage.setItem('mrl_admin','1');
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    showPage('dashboard', document.querySelector('.nav-item'));
  } else {
    document.getElementById('login-err').classList.remove('hidden');
  }
}
function logout(){ localStorage.removeItem('mrl_admin'); location.reload(); }

// check already logged in
if(localStorage.getItem('mrl_admin')==='1'){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  showPage('dashboard', document.querySelector('.nav-item'));
}

function showPage(name, el){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  const mc = document.getElementById('main-content');
  if(name==='dashboard') mc.innerHTML = renderDashboard();
  else if(name==='products') mc.innerHTML = renderProducts();
  else if(name==='orders') mc.innerHTML = renderOrders();
}

// ---- PRODUCTS ----
function getProducts(){
  try{ return JSON.parse(localStorage.getItem('mrl_products')||'[]'); }catch(e){ return []; }
}
function saveProducts(arr){ localStorage.setItem('mrl_products', JSON.stringify(arr)); }

function renderProducts(){
  const prods = getProducts();
  const rows = prods.length ? prods.map(p=>`
    <tr>
      <td><strong>${esc(p.name)}</strong></td>
      <td>${esc(p.cat)}</td>
      <td><strong>${p.price} ₴</strong>${p.old?` <s style="color:#8a8f84;font-size:12px">${p.old} ₴</s>`:''}</td>
      <td>${p.badge?`<span class="badge badge-${p.badge==='Sale'?'sale':(p.badge==='Новинка'?'new':'best')}">${esc(p.badge)}</span>`:''}</td>
      <td>${p.stock||0}</td>
      <td><div class="actions">
        <button class="btn btn-outline btn-sm" onclick="editProd(${p.id})">Редагувати</button>
        <button class="btn btn-danger btn-sm" onclick="deleteProd(${p.id})">Видалити</button>
      </div></td>
    </tr>`).join('') : `<tr><td colspan="6" style="text-align:center;padding:32px;color:#6c7166">Товарів поки немає</td></tr>`;
  return `
    <div class="page-header"><h2>Товари</h2><button class="btn btn-sm" onclick="openNewProd()">+ Додати товар</button></div>
    <div class="card">
      <table><thead><tr><th>Назва</th><th>Категорія</th><th>Ціна</th><th>Значок</th><th>Залишок</th><th>Дії</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
}

let editingId = null;
function openNewProd(){
  editingId = null;
  document.getElementById('modal-title').textContent = 'Новий товар';
  ['name','price','old','desc','sizes','tone'].forEach(k=>document.getElementById('f-'+k).value='');
  document.getElementById('f-stock').value='10';
  document.getElementById('f-cat').value='Сукні';
  document.getElementById('f-badge').value='';
  document.getElementById('prod-modal').classList.remove('hidden');
}
function editProd(id){
  const p = getProducts().find(x=>x.id===id); if(!p) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Редагувати товар';
  document.getElementById('f-name').value = p.name||'';
  document.getElementById('f-price').value = p.price||'';
  document.getElementById('f-old').value = p.old||'';
  document.getElementById('f-cat').value = p.cat||'Сукні';
  document.getElementById('f-badge').value = p.badge||'';
  document.getElementById('f-stock').value = p.stock||10;
  document.getElementById('f-sizes').value = (p.sizes||[]).join(',');
  document.getElementById('f-tone').value = p.tone||'#7c8568';
  document.getElementById('f-desc').value = p.desc||'';
  document.getElementById('prod-modal').classList.remove('hidden');
}
function closeProdModal(){ document.getElementById('prod-modal').classList.add('hidden'); }
function saveProd(){
  const name = document.getElementById('f-name').value.trim();
  const price = parseInt(document.getElementById('f-price').value)||0;
  if(!name||!price){ alert('Заповніть назву та ціну'); return; }
  const prods = getProducts();
  const obj = {
    id: editingId || Date.now(),
    name, price,
    old: parseInt(document.getElementById('f-old').value)||0||undefined,
    cat: document.getElementById('f-cat').value,
    badge: document.getElementById('f-badge').value||undefined,
    stock: parseInt(document.getElementById('f-stock').value)||10,
    sizes: document.getElementById('f-sizes').value.split(',').map(s=>s.trim()).filter(Boolean),
    tone: document.getElementById('f-tone').value||'#7c8568',
    desc: document.getElementById('f-desc').value.trim(),
    colors: [['Чорнило','#3d3d3d']]
  };
  if(!obj.old) delete obj.old;
  if(!obj.badge) delete obj.badge;
  if(editingId){
    const idx = prods.findIndex(x=>x.id===editingId);
    if(idx>=0) prods[idx]=obj;
  } else {
    prods.unshift(obj);
  }
  saveProducts(prods);
  closeProdModal();
  showPage('products', null);
}
function deleteProd(id){
  if(!confirm('Видалити товар?')) return;
  saveProducts(getProducts().filter(p=>p.id!==id));
  showPage('products', null);
}

// ---- ORDERS ----
function getOrders(){ try{ return JSON.parse(localStorage.getItem('mrl_orders')||'[]'); }catch(e){ return []; } }

function renderOrders(){
  const orders = getOrders();
  const rows = orders.length ? orders.map(o=>{
    const date = new Date(o.date).toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'});
    const itemsStr = (o.items||[]).map(i=>i.name+'×'+i.qty).join(', ');
    const total = (o.items||[]).reduce((a,c)=>a+c.price*c.qty,0);
    return `<tr>
      <td style="font-size:12px;color:#6c7166">#${String(o.id).slice(-6)}<br/>${date}</td>
      <td><strong>${esc(o.name||'')}</strong><br/><span style="font-size:12px;color:#6c7166">${esc(o.phone||'')}</span></td>
      <td style="font-size:12px">${esc(itemsStr)}</td>
      <td><strong>${total} ₴</strong>${o.discount?`<br/><span style="font-size:11px;color:#6f7a5e">−${o.discount}%</span>`:''}</td>
      <td>${esc(o.city||'')} ${esc(o.warehouse||o.address||'')}</td>
      <td><span class="order-status status-new">Нове</span></td>
    </tr>`;
  }).join('') : `<tr><td colspan="6" style="text-align:center;padding:32px;color:#6c7166">Замовлень ще немає</td></tr>`;
  return `
    <div class="page-header"><h2>Замовлення</h2></div>
    <div class="card">
      <table><thead><tr><th>ID / Дата</th><th>Клієнт</th><th>Товари</th><th>Сума</th><th>Доставка</th><th>Статус</th></tr></thead>
      <tbody>${rows}</tbody></table>
    </div>`;
}

// ---- DASHBOARD ----
function renderDashboard(){
  const orders = getOrders();
  const prods = getProducts();
  const total = orders.reduce((a,o)=>{
    const t=(o.items||[]).reduce((x,c)=>x+c.price*c.qty,0); return a+t;
  },0);
  return `
    <div class="page-header"><h2>Дашборд</h2></div>
    <div class="stats-row">
      <div class="stat-card"><div class="num">${orders.length}</div><div class="lbl">Замовлень</div></div>
      <div class="stat-card"><div class="num">${total.toLocaleString('uk-UA')} ₴</div><div class="lbl">Загальний дохід</div></div>
      <div class="stat-card"><div class="num">${prods.length}</div><div class="lbl">Товарів (кастомних)</div></div>
      <div class="stat-card"><div class="num">${orders.filter(o=>new Date(o.date)>new Date(Date.now()-86400000*7)).length}</div><div class="lbl">Замовлень за тиждень</div></div>
    </div>
    <div class="card"><h3>Останні замовлення</h3>
      ${orders.slice(0,5).length ? `<table><thead><tr><th>Дата</th><th>Клієнт</th><th>Сума</th></tr></thead><tbody>
        ${orders.slice(0,5).map(o=>{
          const date=new Date(o.date).toLocaleDateString('uk-UA');
          const total=(o.items||[]).reduce((a,c)=>a+c.price*c.qty,0);
          return `<tr><td style="font-size:12px;color:#6c7166">${date}</td><td>${esc(o.name||'')}</td><td><strong>${total} ₴</strong></td></tr>`;
        }).join('')}
      </tbody></table>` : '<p style="color:#6c7166;font-size:14px">Замовлень поки немає</p>'}
    </div>`;
}

function esc(s){ return String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
</script>
</body>
</html>
