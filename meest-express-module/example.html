<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meest Express Widget — приклад</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; color: #1e231f; }
    h2   { font-size: 18px; margin-bottom: 20px; }
    #result { margin-top: 20px; background: #f5f5f0; padding: 14px; font-size: 13px; line-height: 1.7; border-radius: 4px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Оберіть відділення Meest Express</h2>

  <div id="meest-root"></div>

  <div id="result">Вибір ще не зроблений</div>

  <script src="meest-widget.js"></script>
  <script>
    const widget = new MeestWidget({
      container: document.getElementById('meest-root'),
      apiBase:   '/api/meest.php',   // ← змініть на свій шлях
      onChange:  (result) => {
        const el = document.getElementById('result');
        el.textContent = result
          ? JSON.stringify(result, null, 2)
          : 'Вибір ще не зроблений';
      },
    });
  </script>
</body>
</html>
